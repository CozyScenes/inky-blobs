<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vaporwave E-Ink Ocean</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  cursor: pointer;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function makeRng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return {
    next()     { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967295; },
    range(a,b) { return a + this.next() * (b - a); },
    int(a,b)   { return Math.floor(a + this.next() * (b - a + 1)); },
    pick(arr)  { return arr[Math.floor(this.next() * arr.length)]; },
    bool(p=0.5){ return this.next() < p; }
  };
}

function rgba(r,g,b,a){ return `rgba(${r},${g},${b},${a})`; }

const PALETTES = [
  {
    name:'paper day',
    skyT:rgba(245,242,234,1), skyM:rgba(225,220,208,1), skyB:rgba(195,190,175,1),
    sunA:rgba(255,255,255,1), sunB:rgba(245,242,232,1), sunC:rgba(225,220,205,1),
    sunGlow:rgba(180,170,150,0.18),
    grid:rgba(28,26,20,1),
    floorT:rgba(158,152,138,1), floorB:rgba(96,92,82,1),
    star:rgba(20,18,12,1),
    accent:rgba(20,18,12,1),
    sunLine:rgba(36,32,24,0.82),
    reflA:rgba(255,255,255,0.20), reflB:rgba(255,255,255,0),
    scanA:rgba(0,0,0,0.04),
  },
  {
    name:'dusk',
    skyT:rgba(220,214,198,1), skyM:rgba(182,176,160,1), skyB:rgba(130,124,110,1),
    sunA:rgba(255,255,248,1), sunB:rgba(245,239,224,1), sunC:rgba(228,220,202,1),
    sunGlow:rgba(220,212,190,0.16),
    grid:rgba(26,24,18,1),
    floorT:rgba(142,136,122,1), floorB:rgba(82,78,68,1),
    star:rgba(18,16,11,1),
    accent:rgba(18,16,11,1),
    sunLine:rgba(30,27,20,0.84),
    reflA:rgba(255,255,245,0.18), reflB:rgba(255,255,245,0),
    scanA:rgba(0,0,0,0.04),
  },
  {
    name:'high contrast',
    skyT:rgba(255,255,255,1), skyM:rgba(235,232,222,1), skyB:rgba(198,194,180,1),
    sunA:rgba(255,255,255,1), sunB:rgba(255,255,255,1), sunC:rgba(242,238,228,1),
    sunGlow:rgba(165,158,140,0.15),
    grid:rgba(15,14,10,1),
    floorT:rgba(164,158,142,1), floorB:rgba(92,88,78,1),
    star:rgba(12,10,7,1),
    accent:rgba(12,10,7,1),
    sunLine:rgba(20,18,12,0.88),
    reflA:rgba(255,255,255,0.22), reflB:rgba(255,255,255,0),
    scanA:rgba(0,0,0,0.05),
  }
];

const SCENES = [
  'wide_open',
  'low_sun',
  'high_sun',
  'dense_grid',
  'minimal_grid',
  'foggy',
  'huge_sun',
  'offcenter',
  'city_grid',
  'ocean_open',
  'ocean_heavy'
];

let currentScene = 'wide_open';
let currentInverse = false;

function chooseHorizon(H, rng, scene) {
  switch (scene) {
    case 'low_sun':      return H * rng.range(0.55, 0.65);
    case 'high_sun':     return H * rng.range(0.30, 0.40);
    case 'wide_open':    return H * rng.range(0.45, 0.50);
    case 'foggy':        return H * rng.range(0.48, 0.54);
    case 'minimal_grid': return H * rng.range(0.42, 0.48);
    case 'ocean_open':   return H * rng.range(0.44, 0.50);
    case 'ocean_heavy':  return H * rng.range(0.48, 0.56);
    default:             return H * rng.range(0.40, 0.54);
  }
}

function drawSky(W, H, pal, rng, horizon) {
  const g = ctx.createLinearGradient(0, 0, 0, horizon);
  g.addColorStop(0, pal.skyT);
  g.addColorStop(0.55, pal.skyM);
  g.addColorStop(1, pal.skyB);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, horizon + 2);

  if (currentScene === 'foggy') {
    const fog = ctx.createLinearGradient(0, 0, 0, horizon);
    fog.addColorStop(0, 'rgba(255,255,255,0.00)');
    fog.addColorStop(1, 'rgba(255,255,255,0.18)');
    ctx.fillStyle = fog;
    ctx.fillRect(0, 0, W, horizon);
  }
}

function drawStars(W, horizon, pal, rng) {
  const n =
    currentScene === 'minimal_grid' ? rng.int(12, 35) :
    currentScene === 'foggy' ? rng.int(8, 25) :
    rng.int(30, 95);

  for (let i = 0; i < n; i++) {
    const x = rng.range(0, W);
    const y = rng.range(0, horizon * 0.88);
    ctx.save();
    ctx.globalAlpha = rng.range(0.25, 0.8);
    ctx.fillStyle = pal.star;
    ctx.beginPath();
    ctx.arc(x, y, rng.range(0.6, 2.0), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSun(W, horizon, pal, rng) {
  let cx;
  if (currentScene === 'offcenter') {
    cx = W * rng.range(0.18, 0.82);
  } else {
    cx = W * rng.range(0.35, 0.65);
  }

  let r;
  if (currentScene === 'huge_sun') {
    r = Math.min(W, horizon) * rng.range(0.28, 0.40);
  } else if (currentScene === 'minimal_grid') {
    r = Math.min(W, horizon) * rng.range(0.12, 0.18);
  } else {
    r = Math.min(W, horizon) * rng.range(0.16, 0.27);
  }

  let cy;
  if (currentScene === 'low_sun') {
    cy = horizon - r - rng.range(2, 14);
  } else if (currentScene === 'high_sun') {
    cy = horizon - r - rng.range(horizon * 0.18, horizon * 0.34);
  } else {
    cy = horizon - r - rng.range(r * 0.08, horizon * 0.20);
  }

  for (let i = 2; i >= 0; i--) {
    const gr = ctx.createRadialGradient(cx, cy, r * 0.8, cx, cy, r * (1.8 + i * 0.35));
    gr.addColorStop(0, pal.sunGlow);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(cx, cy, r * (1.8 + i * 0.35), 0, Math.PI * 2);
    ctx.fill();
  }

  const sg = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  sg.addColorStop(0, pal.sunA);
  sg.addColorStop(0.5, pal.sunB);
  sg.addColorStop(1, pal.sunC);
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
  ctx.clip();

  const lCount = currentScene === 'minimal_grid' ? rng.int(7, 12) : rng.int(10, 18);
  const lStep = r / lCount;
  for (let i = 0; i < lCount; i++) {
    const ly = cy + i * lStep;
    ctx.globalAlpha = rng.range(0.7, 0.92);
    ctx.fillStyle = pal.sunLine;
    ctx.fillRect(cx - r, ly, r * 2, lStep * rng.range(0.20, 0.42));
  }
  ctx.restore();

  return { cx, cy, r };
}

function drawMountains(W, horizon, rng, layers) {
  const shadeSets = currentInverse
    ? [210, 160, 105, 45]
    : [150, 105, 60, 18];

  for (let l = layers - 1; l >= 0; l--) {
    const yBase = horizon + 4 + (layers - 1 - l) * 2;
    const depth = l / Math.max(1, layers - 1);

    const maxH =
      horizon *
      (
        l === layers - 1 ? rng.range(0.18, 0.28) :
        l === 0 ? rng.range(0.34, 0.52) :
        rng.range(0.24, 0.40)
      );

    const nPts = rng.int(16, 28);
    const ptX = [];
    const ptY = [];

    ptX.push(-20);
    ptY.push(yBase + 10);

    for (let i = 1; i <= nPts; i++) {
      const x = (i / (nPts + 1)) * (W + 40) - 20;
      const jag = 1 - depth * 0.35;
      const base = rng.range(0.04, 0.14);
      const spike =
        rng.next() < (0.22 + jag * 0.18)
          ? rng.range(0.50, 0.95)
          : rng.next() < 0.5
            ? rng.range(0.22, 0.48)
            : rng.range(0.02, 0.16);

      const h = maxH * (base + spike * (1 - base));
      ptX.push(x + rng.range(-W / nPts * 0.22, W / nPts * 0.22));
      ptY.push(yBase - h);
    }

    ptX.push(W + 20);
    ptY.push(yBase + 10);

    const shade = shadeSets[Math.min(l, shadeSets.length - 1)];
    ctx.beginPath();
    ctx.moveTo(ptX[0], ptY[0]);

    for (let i = 1; i < ptX.length - 1; i++) {
      const mx = (ptX[i] + ptX[i + 1]) / 2;
      const my = (ptY[i] + ptY[i + 1]) / 2;
      ctx.quadraticCurveTo(ptX[i], ptY[i], mx, my);
    }

    ctx.lineTo(ptX[ptX.length - 1], ptY[ptY.length - 1]);
    ctx.lineTo(W + 20, yBase + 10);
    ctx.lineTo(-20, yBase + 10);
    ctx.closePath();

    ctx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;
    ctx.fill();
  }
}

function drawCity(W, horizon, pal, rng) {
  if (currentScene !== 'city_grid' && rng.bool(0.8)) return;

  const count = rng.int(10, 22);
  const cw = W * rng.range(0.45, 0.88);
  const cx = (W - cw) / 2 + rng.range(-W * 0.08, W * 0.08);
  const maxH = horizon * rng.range(0.12, 0.30);
  const shade = currentInverse ? 210 : 15;

  for (let i = 0; i < count; i++) {
    const bx = cx + (i / count) * cw + rng.range(-cw / count * 0.2, 0);
    const bw = (cw / count) * rng.range(0.5, 0.92);
    const bh = maxH * rng.range(0.15, 1.0);
    const by = horizon - bh;

    ctx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;
    ctx.fillRect(bx, by, bw, bh);

    if (rng.bool(0.45)) {
      const wc = rng.int(2, 4), wr = rng.int(2, 8);
      const ww = bw / (wc * 2 + 1), wh = bh / (wr * 2 + 1);
      const winShade = currentInverse ? 160 : 70;
      for (let row = 0; row < wr; row++) {
        for (let col = 0; col < wc; col++) {
          if (rng.bool(0.28)) {
            ctx.fillStyle = `rgb(${winShade}, ${winShade}, ${winShade})`;
            ctx.globalAlpha = rng.range(0.20, 0.50);
            ctx.fillRect(bx + ww * (col * 2 + 1), by + wh * (row * 2 + 1), ww, wh);
            ctx.globalAlpha = 1;
          }
        }
      }
    }
  }
}

function drawGrid(W, H, horizon, pal, rng) {
  const fg = ctx.createLinearGradient(0, horizon, 0, H);
  fg.addColorStop(0, pal.floorT);
  fg.addColorStop(0.55, pal.floorT);
  fg.addColorStop(1, pal.floorB);
  ctx.fillStyle = fg;
  ctx.fillRect(0, horizon, W, H - horizon);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, horizon, W, H - horizon);
  ctx.clip();

  const rows =
    currentScene === 'dense_grid' ? rng.int(24, 36) :
    currentScene === 'minimal_grid' ? rng.int(8, 12) :
    rng.int(14, 22);

  for (let r = 0; r <= rows; r++) {
    const t = Math.pow(r / rows, currentScene === 'minimal_grid' ? 1.15 : 1.3);
    const y = horizon + (H - horizon) * t;
    ctx.strokeStyle = pal.grid;
    ctx.lineWidth = 0.8 + t * 1.8;
    ctx.globalAlpha = 0.18 + t * 0.38;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  const cols =
    currentScene === 'dense_grid' ? rng.int(38, 54) :
    currentScene === 'minimal_grid' ? rng.int(14, 20) :
    rng.int(24, 40);

  const vpX = currentScene === 'offcenter'
    ? W * rng.range(0.35, 0.65)
    : W * rng.range(0.46, 0.54);

  const spreadBottom =
    currentScene === 'minimal_grid' ? W * rng.range(1.8, 2.4) :
    currentScene === 'dense_grid' ? W * rng.range(3.0, 4.2) :
    W * rng.range(2.4, 3.2);

  const spreadTop =
    currentScene === 'minimal_grid' ? spreadBottom * rng.range(0.18, 0.28) :
    spreadBottom * rng.range(0.10, 0.18);

  for (let c = -cols; c <= cols * 2; c++) {
    const frac = c / cols;
    const centered = frac - 0.5;
    const bottomX = vpX + centered * spreadBottom;
    const topX = vpX + centered * spreadTop;
    const distFromCenter = Math.min(1, Math.abs(centered) * 1.5);

    ctx.strokeStyle = pal.grid;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha =
      currentScene === 'dense_grid'
        ? 0.15 + distFromCenter * 0.20
        : 0.10 + distFromCenter * 0.18;

    ctx.beginPath();
    ctx.moveTo(topX, horizon);
    ctx.lineTo(bottomX, H);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawIsland(W, horizon, rng) {
  const islandW = W * rng.range(0.10, 0.24);
  const islandH = horizon * rng.range(0.04, 0.10);
  const cx =
    currentScene === 'offcenter'
      ? W * rng.range(0.20, 0.80)
      : W * rng.range(0.35, 0.65);

  const baseY = horizon + rng.range(2, 10);
  const shade = currentInverse ? 210 : 28;
  ctx.fillStyle = `rgb(${shade}, ${shade}, ${shade})`;

  ctx.beginPath();
  ctx.moveTo(cx - islandW * 0.55, baseY);
  ctx.quadraticCurveTo(
    cx - islandW * 0.25,
    baseY - islandH * rng.range(0.5, 0.9),
    cx,
    baseY - islandH
  );
  ctx.quadraticCurveTo(
    cx + islandW * 0.25,
    baseY - islandH * rng.range(0.45, 0.85),
    cx + islandW * 0.55,
    baseY
  );
  ctx.quadraticCurveTo(
    cx,
    baseY + islandH * 0.18,
    cx - islandW * 0.55,
    baseY
  );
  ctx.closePath();
  ctx.fill();

  if (rng.bool(0.7)) {
    const palmShade = currentInverse ? 185 : 10;
    ctx.strokeStyle = `rgb(${palmShade}, ${palmShade}, ${palmShade})`;
    ctx.fillStyle = `rgb(${palmShade}, ${palmShade}, ${palmShade})`;

    const trunkX = cx + islandW * rng.range(-0.12, 0.12);
    const trunkY = baseY - islandH * 0.35;
    const trunkH = islandH * rng.range(0.35, 0.75);
    const lean = rng.range(-0.08, 0.08) * islandW;

    ctx.beginPath();
    ctx.moveTo(trunkX - 1.5, trunkY);
    ctx.lineTo(trunkX + 1.5, trunkY);
    ctx.lineTo(trunkX + lean + 1, trunkY - trunkH);
    ctx.lineTo(trunkX + lean - 1, trunkY - trunkH);
    ctx.closePath();
    ctx.fill();

    const topX = trunkX + lean;
    const topY = trunkY - trunkH;

    for (let i = 0; i < 5; i++) {
      const ang = -Math.PI * 0.9 + (i / 4) * Math.PI * 0.8;
      const len = islandH * rng.range(0.20, 0.35);
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.lineTo(topX + Math.cos(ang) * len, topY + Math.sin(ang) * len);
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
  }
}

function drawOcean(W, H, horizon, rng) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, horizon, W, H - horizon);
  ctx.clip();

  const bandCount =
    currentScene === 'minimal_grid' ? rng.int(8, 12) :
    currentScene === 'dense_grid' ? rng.int(18, 28) :
    currentScene === 'ocean_heavy' ? rng.int(20, 30) :
    rng.int(12, 20);

  for (let i = 0; i < bandCount; i++) {
    const t = i / Math.max(1, bandCount - 1);
    const y = horizon + (H - horizon) * Math.pow(t, 1.45);

    const amp = (1 - t) * rng.range(2, 5) + t * rng.range(8, 20);
    const freq = (1 - t) * rng.range(1.0, 1.8) + t * rng.range(2.0, 4.5);
    const phase = rng.range(0, Math.PI * 2);
    const segs = 120;

    const shade = currentInverse
      ? Math.round(210 - t * 120)
      : Math.round(185 - t * 120);

    ctx.strokeStyle = `rgb(${shade}, ${shade}, ${shade})`;
    ctx.lineWidth = 0.8 + t * 1.2;
    ctx.globalAlpha = 0.20 + t * 0.35;

    ctx.beginPath();
    for (let s = 0; s <= segs; s++) {
      const x = (s / segs) * W;
      const nx = s / segs;
      const wave =
        Math.sin(nx * Math.PI * 2 * freq + phase) * amp +
        Math.sin(nx * Math.PI * 2 * (freq * 1.9) + phase * 1.3) * amp * 0.35 +
        Math.sin(nx * Math.PI * 2 * (freq * 0.55) + phase * 0.6) * amp * 0.2;

      const wy = y + wave;
      if (s === 0) ctx.moveTo(x, wy);
      else ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawReflection(W, H, horizon, sun, pal, rng) {
  if (!rng.bool(currentScene === 'huge_sun' ? 0.7 : 0.5)) return;

  const rw = sun.r * rng.range(0.9, 1.8);
  const rh = (H - horizon) * rng.range(0.28, 0.46);
  const rg = ctx.createLinearGradient(sun.cx, horizon, sun.cx, horizon + rh);
  rg.addColorStop(0, pal.reflA);
  rg.addColorStop(0.4, pal.reflB);
  rg.addColorStop(1, pal.reflB);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(sun.cx - rw, horizon);
  ctx.lineTo(sun.cx + rw, horizon);
  ctx.lineTo(sun.cx + rw * 0.09, horizon + rh);
  ctx.lineTo(sun.cx - rw * 0.09, horizon + rh);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawScanlines(W, H, pal) {
  if (currentScene === 'minimal_grid') return;
  ctx.save();
  ctx.fillStyle = pal.scanA;
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  ctx.restore();
}

function applyInverse(ctx, W, H) {
  const img = ctx.getImageData(0, 0, W, H);
  const data = img.data;
  for (let i = 0; i < data.length; i += 4) {
    data[i] = 255 - data[i];
    data[i + 1] = 255 - data[i + 1];
    data[i + 2] = 255 - data[i + 2];
  }
  ctx.putImageData(img, 0, 0);
}

function applyEinkDither(ctx, W, H, horizon, scene, isInverse) {
  const img = ctx.getImageData(0, 0, W, H);
  const data = img.data;

  const bayer4 = [
    [0, 8, 2, 10],
    [12, 4, 14, 6],
    [3, 11, 1, 9],
    [15, 7, 13, 5]
  ];

  const levels = [0, 72, 148, 255];

  function nearestLevel(v) {
    let best = levels[0];
    let bestDist = Math.abs(v - best);
    for (let i = 1; i < levels.length; i++) {
      const d = Math.abs(v - levels[i]);
      if (d < bestDist) {
        best = levels[i];
        bestDist = d;
      }
    }
    return best;
  }

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;

      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      let gray = 0.299 * r + 0.587 * g + 0.114 * b;
      gray = ((gray - 128) * (scene === 'foggy' ? 1.05 : 1.18)) + 128;

      if (gray > 238) gray = 255;
      else if (gray < 28) gray = 0;

      gray = Math.max(0, Math.min(255, gray));

      const midness = 1 - Math.abs(gray - 128) / 128;

      let strength =
        scene === 'foggy' ? 18 :
        scene === 'dense_grid' ? 40 :
        scene === 'minimal_grid' ? 22 :
        scene === 'ocean_heavy' ? 34 :
        30;

      if (y >= horizon) strength *= 1.15;
      if (isInverse) strength *= 0.90;

      const threshold = ((bayer4[y % 4][x % 4] / 16) - 0.5) * strength * midness;
      const adjusted = Math.max(0, Math.min(255, gray + threshold));
      const q = nearestLevel(adjusted);

      data[i] = q;
      data[i + 1] = q;
      data[i + 2] = q;
      data[i + 3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
}

function render(seed) {
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;

  const rng = makeRng(seed);
  const pal = rng.pick(PALETTES);
  const scene = rng.pick(SCENES);
  const inverse = rng.bool(0.28);

  currentScene = scene;
  currentInverse = inverse;

  const horizon = chooseHorizon(H, rng, scene);

  drawSky(W, H, pal, rng, horizon);
  drawStars(W, horizon, pal, rng);
  const sun = drawSun(W, horizon, pal, rng);

  if (scene === 'city_grid') {
    drawMountains(W, horizon, rng, rng.int(3, 4));
    drawCity(W, horizon, pal, rng);
    drawGrid(W, H, horizon, pal, rng);
  } else {
    if (rng.bool(0.65)) {
      drawMountains(W, horizon, rng, rng.int(3, 4));
    }
    drawIsland(W, horizon, rng);
    drawOcean(W, H, horizon, rng);
  }

  drawReflection(W, H, horizon, sun, pal, rng);
  drawScanlines(W, H, pal);

  if (inverse) {
    applyInverse(ctx, W, H);
  }

  applyEinkDither(ctx, W, H, horizon, scene, inverse);
}

let seed = Math.floor(Math.random() * 0xffffff);
render(seed);

canvas.addEventListener('click', () => {
  seed = Math.floor(Math.random() * 0xffffff);
  render(seed);
});

window.addEventListener('resize', () => render(seed));
</script>
