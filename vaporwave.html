<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vaporwave</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function makeRng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return {
    next()     { s=(Math.imul(1664525,s)+1013904223)>>>0; return s/4294967295; },
    range(a,b) { return a+this.next()*(b-a); },
    int(a,b)   { return Math.floor(a+this.next()*(b-a+1)); },
    pick(arr)  { return arr[Math.floor(this.next()*arr.length)]; },
    bool(p)    { return this.next()<(p||0.5); }
  };
}

function rgba(r,g,b,a){ return `rgba(${r},${g},${b},${a})`; }
function rgb(r,g,b)   { return `rgb(${r},${g},${b})`; }

// E-INK PALETTE DESIGN RULES:
// - Sky: light (200-255) so stars and sun read clearly
// - Sun: white/very light with dark scan lines
// - Mountains: near-black (0-40) solid silhouettes — max contrast vs sky
// - Floor: medium gray (80-140) so grid lines read
// - Grid lines: dark (0-60) on medium floor
// - Stars: dark dots on light sky (inverted from color version)

const PALETTES = [
  {
    name:'paper day',
    skyT:rgba(245,242,234,1), skyM:rgba(225,220,208,1), skyB:rgba(195,190,175,1),
    sunA:rgba(255,255,255,1), sunB:rgba(240,236,222,1), sunC:rgba(220,215,200,1),
    sunGlow:rgba(180,170,150,0.20),
    grid:rgba(30,28,22,1), gridA:rgba(30,28,22,0.9), gridF:rgba(30,28,22,0),
    floorT:rgba(155,150,136,1), floorB:rgba(90,86,76,1),
    mtn:[[12,10,8],[28,25,20],[55,50,42]],
    scanA:rgba(0,0,0,0.06),
    star:rgba(20,18,12,1), accent:rgba(20,18,12,1),
    sunLine:rgba(40,36,28,0.80),
    reflA:rgba(255,255,255,0.35), reflB:rgba(255,255,255,0),
  },
  {
    name:'ink night',
    skyT:rgba(110,106,92,1), skyM:rgba(85,82,70,1), skyB:rgba(62,58,48,1),
    sunA:rgba(255,255,250,1), sunB:rgba(245,240,225,1), sunC:rgba(230,224,205,1),
    sunGlow:rgba(255,255,220,0.18),
    grid:rgba(188,184,168,1), gridA:rgba(188,184,168,0.85), gridF:rgba(188,184,168,0),
    floorT:rgba(72,68,56,1), floorB:rgba(42,39,32,1),
    mtn:[[8,7,5],[18,16,12],[35,32,25]],
    scanA:rgba(200,196,180,0.08),
    star:rgba(235,230,215,1), accent:rgba(235,230,215,1),
    sunLine:rgba(10,9,6,0.85),
    reflA:rgba(245,240,225,0.30), reflB:rgba(245,240,225,0),
  },
  {
    name:'dusk',
    skyT:rgba(210,205,188,1), skyM:rgba(170,164,148,1), skyB:rgba(125,120,105,1),
    sunA:rgba(255,255,245,1), sunB:rgba(248,242,225,1), sunC:rgba(235,228,208,1),
    sunGlow:rgba(240,235,210,0.22),
    grid:rgba(28,26,20,1), gridA:rgba(28,26,20,0.9), gridF:rgba(28,26,20,0),
    floorT:rgba(135,130,116,1), floorB:rgba(75,72,62,1),
    mtn:[[10,9,6],[22,20,15],[45,42,34]],
    scanA:rgba(0,0,0,0.05),
    star:rgba(15,13,9,1), accent:rgba(15,13,9,1),
    sunLine:rgba(30,27,20,0.82),
    reflA:rgba(255,252,238,0.32), reflB:rgba(255,252,238,0),
  },
  {
    name:'high contrast',
    skyT:rgba(255,255,255,1), skyM:rgba(235,232,222,1), skyB:rgba(200,196,182,1),
    sunA:rgba(255,255,255,1), sunB:rgba(255,255,255,1), sunC:rgba(245,242,232,1),
    sunGlow:rgba(150,145,130,0.15),
    grid:rgba(15,14,10,1), gridA:rgba(15,14,10,0.95), gridF:rgba(15,14,10,0),
    floorT:rgba(165,160,144,1), floorB:rgba(95,92,80,1),
    mtn:[[4,3,2],[10,9,6],[22,20,15]],
    scanA:rgba(0,0,0,0.07),
    star:rgba(10,9,6,1), accent:rgba(10,9,6,1),
    sunLine:rgba(20,18,12,0.88),
    reflA:rgba(255,255,255,0.40), reflB:rgba(255,255,255,0),
  },
  {
    name:'graphite',
    skyT:rgba(220,216,204,1), skyM:rgba(185,180,166,1), skyB:rgba(148,143,130,1),
    sunA:rgba(255,255,252,1), sunB:rgba(242,238,224,1), sunC:rgba(225,220,205,1),
    sunGlow:rgba(200,195,178,0.18),
    grid:rgba(35,33,26,1), gridA:rgba(35,33,26,0.88), gridF:rgba(35,33,26,0),
    floorT:rgba(140,136,122,1), floorB:rgba(80,77,66,1),
    mtn:[[8,7,5],[20,18,14],[42,39,32]],
    scanA:rgba(0,0,0,0.06),
    star:rgba(18,16,11,1), accent:rgba(18,16,11,1),
    sunLine:rgba(35,32,24,0.80),
    reflA:rgba(252,250,240,0.30), reflB:rgba(252,250,240,0),
  },
];

function drawSky(W, H, pal, rng) {
  const horizon = H * rng.range(0.40, 0.54);
  const g = ctx.createLinearGradient(0, 0, 0, horizon);
  g.addColorStop(0,   pal.skyT);
  g.addColorStop(0.5, pal.skyM);
  g.addColorStop(1,   pal.skyB);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, horizon + 2);
  return horizon;
}

function drawStars(W, horizon, pal, rng) {
  const n = rng.int(40, 120);
  for (let i = 0; i < n; i++) {
    const x = rng.range(0, W), y = rng.range(0, horizon*0.88);
    ctx.save();
    ctx.globalAlpha = rng.range(0.4, 0.85);
    ctx.fillStyle = pal.star;
    ctx.beginPath(); ctx.arc(x, y, rng.range(0.8, 2.2), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if (rng.bool(0.35)) {
    const sx=rng.range(W*0.1,W*0.9), sy=rng.range(0,horizon*0.3);
    const len=rng.range(30,80), ang=rng.range(-0.4,-0.1);
    const sg=ctx.createLinearGradient(sx,sy,sx+len*Math.cos(ang),sy+len*Math.sin(ang));
    sg.addColorStop(0, pal.star); sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save(); ctx.strokeStyle=sg; ctx.lineWidth=1.5; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx+len*Math.cos(ang),sy+len*Math.sin(ang)); ctx.stroke();
    ctx.restore();
  }
}

function drawSun(W, horizon, pal, rng) {
  const cx = W * rng.range(0.30, 0.70);
  const r  = Math.min(W, horizon) * rng.range(0.16, 0.28);
  // Always keep full circle above horizon — minimum clearance = r + 8px
  const cy = horizon - r - rng.range(r*0.1, horizon*0.55);

  for (let i = 3; i >= 0; i--) {
    const gr = ctx.createRadialGradient(cx, cy, r*0.8, cx, cy, r*(2.0+i*0.4));
    gr.addColorStop(0, pal.sunGlow);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(cx, cy, r*(2.0+i*0.4), 0, Math.PI*2); ctx.fill();
  }

  const sg = ctx.createLinearGradient(cx, cy-r, cx, cy+r);
  sg.addColorStop(0, pal.sunA); sg.addColorStop(0.5, pal.sunB); sg.addColorStop(1, pal.sunC);
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r-0.5, 0, Math.PI*2); ctx.clip();
  const lCount = rng.int(10, 22);
  const lStep  = r / lCount;
  for (let i = 0; i < lCount; i++) {
    const ly = cy + i * lStep;
    ctx.globalAlpha = rng.range(0.65, 0.92);
    ctx.fillStyle = pal.sunLine;
    ctx.fillRect(cx-r, ly, r*2, lStep*rng.range(0.28,0.48));
  }
  ctx.restore();

  return {cx, cy, r};
}

function drawMountains(W, horizon, pal, rng, layers) {
  for (let l = layers-1; l >= 0; l--) {
    const [mr,mg,mb] = pal.mtn[Math.min(l, pal.mtn.length-1)];
    const yBase  = horizon + 4;
    const maxH   = horizon * rng.range(0.28, 0.52) * (1 - l*0.10);
    // Build an organic ridgeline across the full width
    // Many control points — not regular triangles
    const nPts = rng.int(18, 32);
    const ptX = [], ptY = [];

    // Start and end below horizon
    ptX.push(-20); ptY.push(yBase + 10);

    for (let i = 1; i <= nPts; i++) {
      const x = (i / (nPts+1)) * (W+40) - 20;
      // Height varies irregularly — clusters of peaks with valleys
      const base = rng.range(0.05, 0.18); // valley floor
      const spike = rng.next() < 0.35
        ? rng.range(0.55, 1.0)   // major peak
        : rng.next() < 0.5
          ? rng.range(0.25, 0.55) // minor peak
          : rng.range(0.02, 0.20); // valley
      const h = maxH * (base + spike * (1-base));
      ptX.push(x + rng.range(-W/nPts*0.3, W/nPts*0.3));
      ptY.push(yBase - h);
    }

    ptX.push(W+20); ptY.push(yBase + 10);

    // Draw as smooth-ish path using quadratic curves through midpoints
    ctx.beginPath();
    ctx.moveTo(ptX[0], ptY[0]);
    for (let i = 1; i < ptX.length - 1; i++) {
      const mx = (ptX[i] + ptX[i+1]) / 2;
      const my = (ptY[i] + ptY[i+1]) / 2;
      ctx.quadraticCurveTo(ptX[i], ptY[i], mx, my);
    }
    ctx.lineTo(ptX[ptX.length-1], ptY[ptY.length-1]);
    ctx.lineTo(W+20, yBase+10);
    ctx.lineTo(-20, yBase+10);
    ctx.closePath();
    ctx.fillStyle = rgb(mr,mg,mb);
    ctx.fill();
  }
}

function drawGrid(W, H, horizon, pal, rng) {
  // Floor — use a 3-stop gradient with more separation so it doesn't collapse
  const fg = ctx.createLinearGradient(0, horizon, 0, H);
  fg.addColorStop(0,   pal.floorT);
  fg.addColorStop(0.5, pal.floorT); // hold the lighter tone longer
  fg.addColorStop(1,   pal.floorB);
  ctx.fillStyle = fg; ctx.fillRect(0, horizon, W, H-horizon);

  ctx.save();
  ctx.beginPath(); ctx.rect(0, horizon, W, H-horizon); ctx.clip();

  // Horizontal lines — heavier weight, higher alpha
  const rows = rng.int(14, 24);
  for (let r = 0; r <= rows; r++) {
    const t = Math.pow(r/rows, 1.6);
    const y = horizon + (H-horizon)*t;
    ctx.strokeStyle = pal.grid;
    ctx.lineWidth = 0.8 + t*2.0;
    ctx.globalAlpha = 0.35 + t*0.55;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Vertical lines
  const cols = rng.int(16, 30);
  const vpCx = W * rng.range(0.38, 0.62);
  const vpSpread = W * rng.range(0.04, 0.12);
  for (let c = 0; c <= cols; c++) {
    const frac = c / cols;
    const bottomX = frac * W;
    const topX = vpCx - vpSpread/2 + frac * vpSpread;
    const distFromCenter = Math.abs(frac - 0.5) * 2;
    ctx.strokeStyle = pal.grid;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.25 + distFromCenter * 0.35;
    ctx.beginPath();
    ctx.moveTo(topX, horizon);
    ctx.lineTo(bottomX, H);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCity(W, horizon, pal, rng) {
  if (rng.bool(0.35)) return;
  const count=rng.int(10,24), cw=W*rng.range(0.45,0.88);
  const cx=(W-cw)/2+rng.range(-W*0.08,W*0.08);
  const maxH=horizon*rng.range(0.14,0.32);
  const [mr,mg,mb]=pal.mtn[0];
  for (let i=0;i<count;i++) {
    const bx=cx+(i/count)*cw+rng.range(-cw/count*0.2,0);
    const bw=(cw/count)*rng.range(0.5,0.92), bh=maxH*rng.range(0.15,1.0), by=horizon-bh;
    ctx.fillStyle=rgb(mr,mg,mb); ctx.fillRect(bx,by,bw,bh);
    if (rng.bool(0.55)) {
      const wc=rng.int(2,4),wr=rng.int(2,8),ww=bw/(wc*2+1),wh=bh/(wr*2+1);
      for(let row=0;row<wr;row++) for(let col=0;col<wc;col++) if(rng.bool(0.4)){
        ctx.fillStyle=pal.accent; ctx.globalAlpha=rng.range(0.3,0.75);
        ctx.fillRect(bx+ww*(col*2+1),by+wh*(row*2+1),ww,wh); ctx.globalAlpha=1;
      }
    }
  }
}

function drawPalm(bx, baseY, height, pal, rng) {
  const lean = rng.range(-0.18, 0.18);
  const topX = bx + lean * height;
  const topY = baseY - height;
  const [mr,mg,mb] = pal.mtn[0];
  const col = rgb(mr,mg,mb);
  const tw = Math.max(8, height * 0.07); // trunk width — filled, not stroked

  ctx.save();
  ctx.fillStyle = col;

  // Filled trunk — tapered quadrilateral along the bezier curve
  // Approximate as 3 segments for a natural taper
  const segs = 8;
  const leftPts = [], rightPts = [];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    // Bezier point
    const px = (1-t)*(1-t)*bx + 2*(1-t)*t*(bx+lean*height*0.5) + t*t*topX;
    const py = (1-t)*(1-t)*baseY + 2*(1-t)*t*(baseY-height*0.5) + t*t*topY;
    // Tangent direction
    const dx = 2*(1-t)*(lean*height*0.5-bx+bx) + 2*t*(topX-lean*height*0.5-bx+bx);
    const dy = 2*(1-t)*(-height*0.5) + 2*t*(topY-baseY+height*0.5);
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    const nx = -dy/len, ny = dx/len; // normal
    const w = tw * (1 - t*0.55); // taper toward top
    leftPts.push([px + nx*w, py + ny*w]);
    rightPts.push([px - nx*w, py - ny*w]);
  }

  ctx.beginPath();
  ctx.moveTo(leftPts[0][0], leftPts[0][1]);
  leftPts.forEach(p => ctx.lineTo(p[0], p[1]));
  for (let i = rightPts.length-1; i >= 0; i--) ctx.lineTo(rightPts[i][0], rightPts[i][1]);
  ctx.closePath();
  ctx.fill();

  // Filled fronds — each is a thick tapered leaf shape
  const frondCount = rng.int(6, 9);
  for (let f = 0; f < frondCount; f++) {
    const baseAng = (f / frondCount) * Math.PI * 2 + rng.range(-0.15, 0.15);
    const fl = height * rng.range(0.38, 0.58);
    const droop = rng.range(0.3, 0.65); // how much it curves down
    const fw = fl * rng.range(0.06, 0.10); // frond width at base

    // Control point droops downward
    const cpx = topX + Math.cos(baseAng) * fl * 0.5;
    const cpy = topY + Math.sin(baseAng) * fl * 0.4 + fl * droop * 0.5;
    const ex  = topX + Math.cos(baseAng) * fl;
    const ey  = topY + Math.sin(baseAng) * fl * 0.5 + fl * droop;

    // Frond as filled tapered shape — two offset bezier curves
    const ox = -Math.sin(baseAng) * fw, oy = Math.cos(baseAng) * fw;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(topX + ox, topY + oy);
    ctx.quadraticCurveTo(cpx + ox*0.5, cpy + oy*0.5, ex, ey);
    ctx.quadraticCurveTo(cpx - ox*0.5, cpy - oy*0.5, topX - ox, topY - oy);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawPalms(W, H, horizon, pal, rng) {
  if (rng.bool(0.12)) return;
  for (let i=0;i<rng.int(2,5);i++) {
    const side=rng.bool()?1:-1, xf=rng.range(0.04,0.44);
    const bx=W*(side>0?xf:1-xf);
    // Tall — 80-140% of horizon height, rooted at or just below horizon
    const h = horizon * rng.range(0.80, 1.40);
    const baseY = horizon + rng.range(0, (H-horizon)*0.08);
    drawPalm(bx, baseY, h, pal, rng);
  }
}

function drawWaveLines(W, H, horizon, pal, rng) {
  const count = rng.int(6, 14);
  ctx.save();
  ctx.beginPath(); ctx.rect(0, horizon, W, H-horizon); ctx.clip();

  for (let i = 0; i < count; i++) {
    const t = Math.pow((i+1)/(count+1), 1.4);
    const y = horizon + (H-horizon)*t;
    const amp   = rng.range(6, 28) * (1 - t*0.4);  // waves flatten toward horizon
    const freq  = rng.range(1.5, 4.0);
    const phase = rng.range(0, Math.PI*2);
    const segs  = 80;

    ctx.beginPath();
    for (let s = 0; s <= segs; s++) {
      const x  = (s/segs)*W;
      const wy = y + Math.sin((s/segs)*Math.PI*2*freq + phase) * amp
                   + Math.sin((s/segs)*Math.PI*2*freq*1.7 + phase*1.3) * amp*0.4;
      s === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
    }

    ctx.strokeStyle = pal.grid;
    ctx.lineWidth   = rng.range(0.5, 1.4);
    ctx.globalAlpha = rng.range(0.15, 0.45) * (0.3 + t*0.7);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawReflection(W, H, horizon, sun, pal, rng) {
  if (!rng.bool(0.55)) return;
  const rw  = sun.r * rng.range(0.8, 1.8);  // much wider
  const rh  = (H - horizon) * rng.range(0.35, 0.55); // shorter fade
  const rg  = ctx.createLinearGradient(sun.cx, horizon, sun.cx, horizon + rh);
  rg.addColorStop(0,   pal.reflA);
  rg.addColorStop(0.4, pal.reflB);
  rg.addColorStop(1,   pal.reflB);
  ctx.save();
  ctx.globalCompositeOperation = 'screen'; // blend with grid, not cover it
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(sun.cx - rw,     horizon);
  ctx.lineTo(sun.cx + rw,     horizon);
  ctx.lineTo(sun.cx + rw * 0.08, horizon + rh);
  ctx.lineTo(sun.cx - rw * 0.08, horizon + rh);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawScanlines(W, H, pal) {
  ctx.save(); ctx.fillStyle=pal.scanA;
  for (let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
  ctx.restore();
}

const SCENES=['mountains_grid','city_grid','palms_grid','mountains_palms','city_palms','minimal'];

function render(seed) {
  const W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
  const rng=makeRng(seed);
  const pal=rng.pick(PALETTES), scene=rng.pick(SCENES);
  const horizon=drawSky(W,H,pal,rng);
  drawStars(W,horizon,pal,rng);
  const sun=drawSun(W,horizon,pal,rng);
  if (scene !== 'palms_grid') drawMountains(W, horizon, pal, rng, rng.int(2,4));
  if (scene === 'city_grid' || scene === 'city_palms') drawCity(W, horizon, pal, rng);
  drawGrid(W, H, horizon, pal, rng);
  drawReflection(W, H, horizon, sun, pal, rng);
  drawWaveLines(W, H, horizon, pal, rng);
  drawScanlines(W, H, pal);
}

let seed=Math.floor(Math.random()*0xffffff);
render(seed);
canvas.addEventListener('click',()=>{seed=Math.floor(Math.random()*0xffffff);render(seed);});
window.addEventListener('resize',()=>render(seed));
</script>
</body>
</html>
