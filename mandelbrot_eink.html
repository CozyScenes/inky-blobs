<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mandelbrot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── RNG ───────────────────────────────────────────────────────────────────────
function makeRng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return {
    next()     { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967295; },
    range(a,b) { return a + this.next() * (b - a); },
    pick(arr)  { return arr[Math.floor(this.next() * arr.length)]; }
  };
}

// ── Interesting regions of the Mandelbrot set ────────────────────────────────
const REGIONS = [
  { cx:-0.5,    cy:0,      zoom:1.0,  label:'full set' },
  { cx:-0.745,  cy:0.1,    zoom:80,   label:'seahorse valley' },
  { cx:0.3,     cy:0,      zoom:10,   label:'elephant valley' },
  { cx:-0.7269, cy:0.1889, zoom:320,  label:'spiral' },
  { cx:-1.786,  cy:0,      zoom:40,   label:'mini-brot' },
  { cx:-0.925,  cy:0.266,  zoom:180,  label:'feather' },
  { cx:-0.5592, cy:0.6222, zoom:200,  label:'double spiral' },
  { cx:-0.1011, cy:0.9563, zoom:400,  label:'node' },
  { cx:-0.7454, cy:0.1130, zoom:1200, label:'tendril' },
  { cx:-1.25,   cy:0.02,   zoom:60,   label:'bulb edge' },
  { cx:-1.401,  cy:0,      zoom:300,  label:'antenna' },
  { cx:-0.7615, cy:0.0879, zoom:900,  label:'valley swirl' },
];

// ── Palette styles ────────────────────────────────────────────────────────────
function palettePaper(t) {
  const v = Math.pow(1 - t, 1.8);
  const r = Math.round(240 * v + 15);
  const g = Math.round(234 * v + 12);
  const b = Math.round(210 * v + 8);
  return [r, g, b];
}

function paletteInk(t) {
  const v = Math.pow(t, 0.6);
  return [Math.round(v * 255), Math.round(v * 252), Math.round(v * 245)];
}

function paletteGraphite(t) {
  const steps = 16;
  const v = Math.floor(Math.pow(1 - t, 1.4) * steps) / steps;
  const c = Math.round(v * 230 + 10);
  return [c, c, c];
}

function paletteDithered(t, x, y) {
  const bayer = [
    [ 0,32, 8,40, 2,34,10,42],
    [48,16,56,24,50,18,58,26],
    [12,44, 4,36,14,46, 6,38],
    [60,28,52,20,62,30,54,22],
    [ 3,35,11,43, 1,33, 9,41],
    [51,19,59,27,49,17,57,25],
    [15,47, 7,39,13,45, 5,37],
    [63,31,55,23,61,29,53,21]
  ];
  const threshold = bayer[y & 7][x & 7] / 64;
  const v = Math.pow(1 - t, 1.6);
  const lit = v > threshold ? 240 : 14;
  return [lit, lit, lit];
}

function paletteSepia(t) {
  const v = Math.pow(1 - t, 1.6);
  return [
    Math.round(v * 225 + 18),
    Math.round(v * 198 + 14),
    Math.round(v * 155 + 10)
  ];
}

function paletteCyan(t) {
  const v = Math.pow(1 - t, 1.5);
  return [
    Math.round(v * 180 + 10),
    Math.round(v * 220 + 15),
    Math.round(v * 210 + 12)
  ];
}

function paletteContour(t) {
  const bands = 12;
  const band = Math.floor(t * bands);
  const inLine = (t * bands - band) < 0.08;
  const v = inLine ? 0.05 : Math.pow(1 - t, 1.3);
  const c = Math.round(v * 235 + 10);
  return [c, c, c];
}

function paletteEink4bit(t) {
  const levels = [0,17,34,51,68,85,102,119,136,153,170,187,204,221,238,255];
  const idx = Math.min(15, Math.floor(Math.pow(1 - t, 1.5) * 16));
  const c = levels[idx];
  return [c, c, c];
}

const PALETTES = [
  { fn: palettePaper,    label: 'paper' },
  { fn: paletteInk,      label: 'ink' },
  { fn: paletteGraphite, label: 'graphite' },
  { fn: paletteDithered, label: 'dithered' },
  { fn: paletteSepia,    label: 'sepia' },
  { fn: paletteCyan,     label: 'cyan' },
  { fn: paletteContour,  label: 'contour' },
  { fn: paletteEink4bit, label: '4-bit e-ink' },
];

// ── Render ────────────────────────────────────────────────────────────────────
function render(seed) {
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const rng = makeRng(seed);

  const region = rng.pick(REGIONS);
  const jitterX = rng.range(-0.3, 0.3) / region.zoom;
  const jitterY = rng.range(-0.3, 0.3) / region.zoom;
  const cx = region.cx + jitterX;
  const cy = region.cy + jitterY;

  const zoomMult = Math.pow(2, rng.range(-0.8, 0.8));
  const zoom = region.zoom * zoomMult;

  const maxIter = Math.round(rng.range(60, 280));
  const palette = rng.pick(PALETTES);
  const insideColor = palette.label === 'ink' ? [8, 8, 8] : palette.fn(0);

  const img = ctx.createImageData(W, H);
  const d = img.data;
  const scale = 3.5 / (Math.min(W, H) * zoom);

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const c0r = (px - W / 2) * scale + cx;
      const c0i = (py - H / 2) * scale + cy;

      let zr = 0;
      let zi = 0;
      let iter = 0;
      let zr2 = 0;
      let zi2 = 0;

      while (zr2 + zi2 <= 4 && iter < maxIter) {
        zi = 2 * zr * zi + c0i;
        zr = zr2 - zi2 + c0r;
        zr2 = zr * zr;
        zi2 = zi * zi;
        iter++;
      }

      const idx = (py * W + px) * 4;

      if (iter === maxIter) {
        d[idx] = insideColor[0];
        d[idx + 1] = insideColor[1];
        d[idx + 2] = insideColor[2];
        d[idx + 3] = 255;
      } else {
        const smooth = iter + 1 - Math.log(Math.log(Math.sqrt(zr2 + zi2))) / Math.log(2);
        const t = Math.max(0, Math.min(1, smooth / maxIter));
        const rgb = palette.fn === paletteDithered
          ? paletteDithered(t, px, py)
          : palette.fn(t);

        d[idx] = rgb[0];
        d[idx + 1] = rgb[1];
        d[idx + 2] = rgb[2];
        d[idx + 3] = 255;
      }
    }
  }

  ctx.putImageData(img, 0, 0);

  // Hard guarantee: no text or overlay
  ctx.globalAlpha = 1;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

let currentSeed = Math.floor(Math.random() * 0xffffff);
render(currentSeed);

canvas.addEventListener('click', () => {
  currentSeed = Math.floor(Math.random() * 0xffffff);
  render(currentSeed);
});

window.addEventListener('resize', () => render(currentSeed));
</script>
</body>
</html>
