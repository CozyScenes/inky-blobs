<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Rorschach – advanced realistic ink</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #efe7d6;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
function makeRng(seed) {
  let s = (seed ^ 0x9e3779b9) >>> 0;
  return {
    next()        { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967295; },
    range(lo, hi) { return lo + this.next() * (hi - lo); },
    int(lo, hi)   { return Math.floor(this.range(lo, hi + 1)); },
    pick(arr)     { return arr[this.int(0, arr.length - 1)]; }
  };
}

function noise2D(x, y, seed) {
  const n = Math.sin(x * 127.1 + y * 311.7 + seed * 91.7) * 43758.5453123;
  return n - Math.floor(n);
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function drawPaper(ctx, W, H, rng) {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#f4eedf');
  bg.addColorStop(1, '#e8dfcb');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const img = ctx.createImageData(W, H);
  const d = img.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const grain1 = (noise2D(x * 0.85, y * 0.85, 2.1) - 0.5) * 9;
      const grain2 = (noise2D(x * 0.22, y * 0.22, 7.4) - 0.5) * 11;
      const fiber  = (noise2D(x * 0.03, y * 1.8, 5.8) - 0.5) * 10;
      const base = 236 + grain1 + grain2 + fiber;
      d[i]     = clamp(base + 8, 220, 247);
      d[i + 1] = clamp(base + 2, 214, 241);
      d[i + 2] = clamp(base - 7, 200, 232);
      d[i + 3] = 38;
    }
  }
  ctx.putImageData(img, 0, 0);

  ctx.save();
  ctx.globalAlpha = 0.035;
  for (let i = 0; i < 2400; i++) {
    ctx.fillStyle = rng.pick(['#8c806d', '#766b5d', '#9a8d78']);
    ctx.fillRect(
      rng.range(0, W),
      rng.range(0, H),
      rng.range(6, 70),
      rng.range(0.3, 1.15)
    );
  }
  ctx.restore();

  const fold = ctx.createLinearGradient(W/2 - 18, 0, W/2 + 18, 0);
  fold.addColorStop(0, 'rgba(120,105,82,0)');
  fold.addColorStop(0.5, 'rgba(120,105,82,0.14)');
  fold.addColorStop(1, 'rgba(120,105,82,0)');
  ctx.fillStyle = fold;
  ctx.fillRect(W/2 - 18, 0, 36, H);
}

function mirrorDraw(ctx, cx, cy, leftFn, rightFn) {
  ctx.save();
  ctx.translate(cx, cy);

  leftFn();

  ctx.save();
  ctx.scale(-1, 1);
  rightFn();
  ctx.restore();

  ctx.restore();
}

function buildBaseLobes(rng, base) {
  const lobes = [{
    ox: rng.range(8, base * 0.03),
    oy: rng.range(-base * 0.02, base * 0.03),
    r:  base * rng.range(0.15, 0.22),
    sx: rng.range(0.78, 0.98),
    sy: rng.range(0.90, 1.22),
    pts: rng.int(12, 18)
  }];

  const extra = rng.int(4, 7);
  for (let i = 0; i < extra; i++) {
    lobes.push({
      ox: rng.range(base * 0.04, base * 0.18),
      oy: rng.range(-base * 0.20, base * 0.22),
      r:  base * rng.range(0.04, 0.11),
      sx: rng.range(0.62, 1.18),
      sy: rng.range(0.70, 1.35),
      pts: rng.int(8, 14)
    });
  }
  return lobes;
}

function radialBlobPoints(rng, lobe, jag = 1) {
  const pts = [];
  const phase1 = rng.range(0, Math.PI * 2);
  const phase2 = rng.range(0, Math.PI * 2);
  const f1 = rng.range(2.4, 4.8);
  const f2 = rng.range(5.5, 9.0);

  for (let i = 0; i < lobe.pts; i++) {
    const a = (i / lobe.pts) * Math.PI * 2;
    const wobble1 = 1 + Math.sin(a * f1 + phase1) * rng.range(0.07, 0.17) * jag;
    const wobble2 = 1 + Math.sin(a * f2 + phase2) * rng.range(0.03, 0.09) * jag;
    const rand = rng.range(0.90, 1.12);
    const r = lobe.r * wobble1 * wobble2 * rand;

    pts.push({
      x: Math.cos(a) * r * lobe.sx + lobe.ox,
      y: Math.sin(a) * r * lobe.sy + lobe.oy
    });
  }
  return pts;
}

function subdividePath(points, depth, jitter, rng) {
  let pts = points.slice();
  for (let d = 0; d < depth; d++) {
    const next = [];
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      const b = pts[(i + 1) % pts.length];
      next.push(a);
      const mx = (a.x + b.x) * 0.5;
      const my = (a.y + b.y) * 0.5;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;
      const off = rng.range(-jitter, jitter);
      next.push({
        x: mx + nx * off + rng.range(-jitter * 0.15, jitter * 0.15),
        y: my + ny * off + rng.range(-jitter * 0.15, jitter * 0.15)
      });
    }
    pts = next;
    jitter *= 0.55;
  }
  return pts;
}

function smoothClosedPath(ctx, pts) {
  const n = pts.length;
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i - 1 + n) % n];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % n];
    const p3 = pts[(i + 2) % n];

    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;

    if (i === 0) ctx.moveTo(p1.x, p1.y);
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
  ctx.closePath();
}

function drawDeformedBlob(ctx, rng, lobe, opts = {}) {
  const pts0 = radialBlobPoints(rng, lobe, opts.jag ?? 1);
  const pts1 = subdividePath(pts0, opts.depth ?? 2, opts.jitter ?? (lobe.r * 0.12), rng);
  smoothClosedPath(ctx, pts1);
}

function drawHalfInk(ctx, rng, base, lobes) {
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';

  // broad absorbed bloom
  for (let pass = 0; pass < 22; pass++) {
    ctx.save();
    ctx.globalAlpha = rng.range(0.015, 0.035);
    ctx.filter = `blur(${rng.range(7, 18)}px)`;
    ctx.fillStyle = rng.pick(['#302620', '#241c17', '#3b2f28', '#211915']);

    for (const src of lobes) {
      const lobe = {
        ...src,
        ox: src.ox + rng.range(-base * 0.010, base * 0.014),
        oy: src.oy + rng.range(-base * 0.012, base * 0.012),
        r:  src.r  * rng.range(1.02, 1.12)
      };
      drawDeformedBlob(ctx, rng, lobe, {
        depth: 2,
        jitter: lobe.r * 0.13,
        jag: 1.3
      });
      ctx.fill();
    }
    ctx.restore();
  }

  // layered translucent shells
  for (let pass = 0; pass < 18; pass++) {
    ctx.save();
    ctx.globalAlpha = rng.range(0.028, 0.065);
    ctx.filter = `blur(${rng.range(0.8, 3.2)}px)`;
    ctx.fillStyle = rng.pick(['#221916', '#1b1411', '#2c221d', '#372b24']);

    for (const src of lobes) {
      const lobe = {
        ...src,
        ox: src.ox + rng.range(-base * 0.004, base * 0.005),
        oy: src.oy + rng.range(-base * 0.005, base * 0.005),
        r:  src.r  * rng.range(0.98, 1.03)
      };
      drawDeformedBlob(ctx, rng, lobe, {
        depth: 3,
        jitter: lobe.r * 0.10,
        jag: 1.05
      });
      ctx.fill();
    }
    ctx.restore();
  }

  // wet core
  ctx.save();
  ctx.globalAlpha = 0.90;
  ctx.fillStyle = '#120d0c';
  for (const src of lobes) {
    const lobe = { ...src, r: src.r * 0.86 };
    drawDeformedBlob(ctx, rng, lobe, {
      depth: 2,
      jitter: lobe.r * 0.07,
      jag: 0.85
    });
    ctx.fill();
  }
  ctx.restore();

  // internal tonal pockets
  for (let i = 0; i < 24; i++) {
    ctx.save();
    ctx.globalAlpha = rng.range(0.02, 0.06);
    ctx.filter = `blur(${rng.range(5, 16)}px)`;
    ctx.fillStyle = rng.pick(['#6c5c52', '#5a4b43', '#7a675b']);
    ctx.beginPath();
    ctx.ellipse(
      rng.range(base * 0.02, base * 0.18),
      rng.range(-base * 0.18, base * 0.18),
      rng.range(base * 0.014, base * 0.075),
      rng.range(base * 0.018, base * 0.10),
      rng.range(-1.1, 1.1),
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.restore();
  }

  // ragged voids
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  for (let i = 0; i < 5; i++) {
    ctx.save();
    ctx.globalAlpha = rng.range(0.35, 0.62);
    ctx.filter = `blur(${rng.range(0.6, 2.0)}px)`;
    const lobe = {
      ox: rng.range(base * 0.03, base * 0.16),
      oy: rng.range(-base * 0.12, base * 0.13),
      r:  base * rng.range(0.018, 0.050),
      sx: rng.range(0.7, 1.35),
      sy: rng.range(0.7, 1.5),
      pts: rng.int(8, 14)
    };
    drawDeformedBlob(ctx, rng, lobe, {
      depth: 2,
      jitter: lobe.r * 0.16,
      jag: 1.4
    });
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // stain around voids so they do not look cut out
  for (let i = 0; i < 10; i++) {
    ctx.save();
    ctx.globalAlpha = rng.range(0.02, 0.045);
    ctx.filter = `blur(${rng.range(2, 7)}px)`;
    ctx.fillStyle = '#4c4038';
    ctx.beginPath();
    ctx.ellipse(
      rng.range(base * 0.03, base * 0.17),
      rng.range(-base * 0.13, base * 0.14),
      rng.range(base * 0.014, base * 0.05),
      rng.range(base * 0.016, base * 0.055),
      rng.range(-1.2, 1.2),
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawInkMass(ctx, rng, cx, cy, W, H) {
  const base = Math.min(W, H);
  const leftLobes = buildBaseLobes(rng, base);
  const rightLobes = JSON.parse(JSON.stringify(leftLobes)).map(l => ({
    ...l,
    ox: l.ox * rng.range(0.97, 1.04),
    oy: l.oy + rng.range(-base * 0.01, base * 0.01),
    r:  l.r * rng.range(0.97, 1.05),
    sx: l.sx * rng.range(0.96, 1.04),
    sy: l.sy * rng.range(0.96, 1.05)
  }));

  mirrorDraw(
    ctx, cx, cy,
    () => drawHalfInk(ctx, rng, base, leftLobes),
    () => drawHalfInk(ctx, rng, base, rightLobes)
  );
}

function drawHalfWickRuns(ctx, rng, base, count) {
  for (let i = 0; i < count; i++) {
    const x = rng.range(base * 0.035, base * 0.12);
    const y = rng.range(base * 0.10, base * 0.19);
    const len = rng.range(base * 0.035, base * 0.09);
    const w = rng.range(base * 0.0025, base * 0.0065);

    ctx.save();
    ctx.globalAlpha = rng.range(0.028, 0.065);
    ctx.filter = `blur(${rng.range(2.5, 7)}px)`;
    ctx.strokeStyle = '#3a3028';
    ctx.lineCap = 'round';
    ctx.lineWidth = w * 2.3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(
      x + rng.range(-w * 4, w * 4), y + len * 0.30,
      x + rng.range(-w * 5, w * 5), y + len * 0.75,
      x + rng.range(-w * 3, w * 3), y + len
    );
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = rng.range(0.04, 0.11);
    ctx.filter = `blur(${rng.range(1.5, 4)}px)`;
    ctx.fillStyle = '#352b24';
    ctx.beginPath();
    ctx.ellipse(
      x + rng.range(-w * 2, w * 2),
      y + len + rng.range(-w, w),
      w * rng.range(1.2, 2.2),
      w * rng.range(1.5, 3.2),
      rng.range(-0.6, 0.6),
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.restore();
  }
}

function drawWicking(ctx, rng, cx, cy, W, H) {
  const base = Math.min(W, H);
  mirrorDraw(
    ctx, cx, cy,
    () => drawHalfWickRuns(ctx, rng, base, rng.int(0, 2)),
    () => drawHalfWickRuns(ctx, rng, base, rng.int(0, 2))
  );
}

function drawHalfSplatter(ctx, rng, base, count) {
  for (let i = 0; i < count; i++) {
    const a = rng.range(0, Math.PI * 2);
    const dist = Math.pow(rng.next(), 0.72) * base * 0.44;
    const x = Math.cos(a) * dist + rng.range(base * 0.005, base * 0.03);
    const y = Math.sin(a) * dist;
    const r = Math.pow(rng.next(), 2.2) * base * 0.004 + 0.12;

    ctx.save();
    ctx.globalAlpha = rng.range(0.012, 0.075);
    ctx.fillStyle = rng.pick(['#1f1815', '#302620', '#41342c']);
    ctx.beginPath();
    ctx.ellipse(
      x, y,
      r * rng.range(0.8, 1.9),
      r * rng.range(0.7, 1.7),
      rng.range(-1, 1),
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.restore();
  }
}

function drawSplatter(ctx, rng, cx, cy, W, H) {
  const base = Math.min(W, H);
  mirrorDraw(
    ctx, cx, cy,
    () => drawHalfSplatter(ctx, rng, base, 110),
    () => drawHalfSplatter(ctx, rng, base, 95)
  );
}

function drawShadow(ctx, W, H) {
  const base = Math.min(W, H);
  const cx = W / 2;
  const cy = H / 2;
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.filter = 'blur(20px)';
  ctx.fillStyle = '#2c241f';
  ctx.beginPath();
  ctx.ellipse(cx, cy + base * 0.02, base * 0.25, base * 0.17, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function draw() {
  const canvas = document.getElementById('c');
  const W = window.innerWidth;
  const H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  const rng = makeRng(Math.floor(Date.now() / 1000));

  drawPaper(ctx, W, H, rng);
  drawInkMass(ctx, rng, W / 2, H / 2, W, H);
  drawWicking(ctx, rng, W / 2, H / 2, W, H);
  drawSplatter(ctx, rng, W / 2, H / 2, W, H);
  drawShadow(ctx, W, H);
}

draw();
window.addEventListener('resize', draw);
</script>
</body>
</html>
